<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .basic{
              margin: 20px;
            max-width: fit-content;
            height: none; 
            background-color: aquamarine;

           transition: all 1s linear ;

        }
        
         .basic p{
            display: none;
         }   
         .basic:hover p{
            display: block;
            color: rgb(15, 204, 204);
            
         } 


        
        .basic:hover{
            color: rgb(213, 208, 217);
           max-width: 300px;
           height: 300px;
            background-color: red;
            box-shadow: 10px 10px 10px black;
            text-align: center;
            font-size: large;
            opacity:0.5;



        }
    </style>
</head>
<body>
      <div class="basic">
         <div class="tra">welcome to our webpage</div>
         <p >Lorem ipsum dolor sit, amet consectetur adipisicing elit. Nobis libero maxime quisquam! Id voluptas nulla asperiores in, sint quod a, dicta quam pariatur distinctio nesciunt! Corrupti sequi atque quisquam aliquam.</p>
      </div>
</body>
</html>
