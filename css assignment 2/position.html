<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         div{
            border: 5px solid black;
            height: 200px;
         }
         h1{
            border: 2px solid;
            position: static;
            background-color: aqua;

         }
         h2{
            border: 2px solid;
            position: relative;
            top: 20px;
            left: 20px;
            background-color: chocolate;
         }
         h3{
            border: 2px solid;
            position: absolute;
            
            right:30px ;
         }
        
            

         

    </style>
</head>
<body>
    <div class="position">
       <h1>welcome to our party and enjoy the party </h1> 
       <h2>welcome to our party and enjoy the party </h2>
       
        <h3>welcome to our party and enjoy the party </h3>

       
    
        
    </div>
</body>
</html>
