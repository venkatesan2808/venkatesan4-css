<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
          .dropdown{
              position: relative;
              display: block;
          }
          .down{
              background-color:rebeccapurple;
              color: azure;
              padding: 12px 20px;
              font-size: 15px;
              border: none;
              cursor: pointer;

          }
          .drop{
              display: none; 
               position: absolute; 
            background-color: #f9f9f9; 
             min-width: 160px; 
              box-shadow: 0 8px 16px rgba(22, 18, 18, 0.2); 
              z-index:1; 
          }
          .drop a{
            color: black; 
            padding: 12px 16px; 
             text-decoration: none; 
              display: block; 

          }
          .drop a:hover { 
  background-color: #f1f1f1; 
} 
 
/* Show dropdown on hover */ 
.dropdown:hover .drop { 
  display: block; 
} 
 
/* Change button color on hover */ 
 
.dropdown:hover .down { 
  background-color: #d70e9e; 
} 
    </style>
</head>
<body> 
    <div class="dropdown">
        <button class="down">menu</button>
        <div  class="drop">
            <a href="#">breakfast</a>
            <a href="#">dinner</a>
            <a href="#">lunch</a>
        </div>
    </div>
</body>
</html>
