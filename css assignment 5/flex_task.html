<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
.container{
    display: flex;              
    flex-direction: row;        
     justify-content: center;
    align-items:center;         
    gap: 20px;                 
    height: 300px;
    background-color: lightgray;
}

.box{
    width: 120px;
    height: 120px;
    background-color: skyblue;
    text-align: center;
    line-height: 120px;
    font-weight: bold;
    border-radius: 8px;
}
@media  (max-width:786px) {
   
    .container{
         flex-direction: column;
         height: 400px;
    }
}
    </style>
</head>
<body>


<div class="container">
    <div class="box">Box 1</div>
    <div class="box">Box 2</div>
    <div class="box">Box 3</div>
</div>

</body>
</html>
